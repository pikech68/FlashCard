<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#eaf0ff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="キャリコン単語帳">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./icon-192.png">
<link rel="apple-touch-icon" href="./icon-192.png">
<title>キャリコン単語帳</title>

<style>
:root{
  --bg:#f5f7fb;
  --card:#ffffff;
  --text:#20242c;
  --sub:#687080;
  --line:#dfe4ee;
  --primary:#365ea8;
  --primary-soft:#eaf0ff;
  --danger:#b33a3a;
  --danger-soft:#fff0f0;
  --shadow:0 8px 24px rgba(25,42,70,.08);
}

*{box-sizing:border-box}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:system-ui,-apple-system,"Segoe UI","Noto Sans JP",sans-serif;
}

.app{
  width:min(100%,880px);
  margin:0 auto;
  padding:14px 12px 40px;
}

.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:12px;
}

h1{
  margin:0;
  font-size:23px;
  letter-spacing:.02em;
}

.small-note{
  color:var(--sub);
  font-size:13px;
}

.panel{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:18px;
  box-shadow:var(--shadow);
}

.controls{
  padding:12px;
  margin-bottom:12px;
}

.mode-row{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:7px;
}

button{
  border:1px solid var(--line);
  border-radius:10px;
  background:#fff;
  color:var(--text);
  font-size:14px;
  padding:9px 10px;
  cursor:pointer;
}

button:active{transform:translateY(1px)}

button.primary{
  background:var(--primary);
  color:#fff;
  border-color:var(--primary);
  font-weight:700;
}

button.soft{
  background:var(--primary-soft);
  color:var(--primary);
  border-color:#cbd8f3;
}

button.danger{
  color:var(--danger);
  background:var(--danger-soft);
  border-color:#efcaca;
}

#search{
  width:100%;
  margin-top:9px;
  padding:11px 12px;
  border:1px solid var(--line);
  border-radius:10px;
  background:#fff;
  font-size:16px;
}

.study-card{
  padding:17px 16px 15px;
}

.card-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:12px;
}

#counter{
  color:var(--sub);
  font-size:14px;
}

.status{
  font-size:13px;
  color:var(--primary);
  font-weight:700;
}

#question{
  white-space:pre-wrap;
  font-size:25px;
  line-height:1.65;
  font-weight:650;
  min-height:150px;
  padding:8px 2px 4px;
}

#cardImage{
  display:none;
  width:100%;
  max-height:470px;
  object-fit:contain;
  margin:8px 0 14px;
  border-radius:12px;
  background:#f8f9fc;
  border:1px solid var(--line);
}

.main-actions{
  display:grid;
  grid-template-columns:1fr 1.25fr 1fr;
  gap:8px;
  margin-top:10px;
}

.main-actions button{
  padding:11px 8px;
  font-size:15px;
}

.secondary-actions{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:7px;
  margin-top:10px;
}

#answer{
  white-space:pre-wrap;
  font-size:23px;
  line-height:1.65;
  margin-top:16px;
  padding:16px 14px;
  border-radius:12px;
  background:#f7f9fd;
  border:1px solid var(--line);
}

.add-wrap{
  margin-top:14px;
}

summary{
  list-style:none;
  cursor:pointer;
  padding:14px 16px;
  font-weight:700;
  font-size:17px;
}

summary::-webkit-details-marker{display:none}

summary::after{
  content:"＋";
  float:right;
  color:var(--primary);
}

details[open] summary::after{content:"－"}

.form-body{
  border-top:1px solid var(--line);
  padding:14px 14px 16px;
}

textarea,
input[type="text"]{
  width:100%;
  margin:7px 0;
  padding:12px;
  border:1px solid var(--line);
  border-radius:10px;
  font-size:17px;
  line-height:1.5;
  background:#fff;
}

textarea{
  min-height:112px;
  resize:vertical;
}

.photo-box{
  border:1px dashed #bfc8d8;
  border-radius:12px;
  padding:12px;
  margin:10px 0;
  background:#fafbfe;
}

#preview{
  display:none;
  width:100%;
  max-height:300px;
  object-fit:contain;
  margin:10px 0;
  border-radius:10px;
}

.form-actions{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:8px;
}

#message{
  min-height:22px;
  margin-top:9px;
  font-size:14px;
  color:#256029;
}

.hidden{display:none!important}

@media(max-width:520px){
  .app{padding:8px 8px 28px}
  .topbar{padding:4px 3px}
  h1{font-size:21px}
  .controls{padding:10px}
  .study-card{padding:14px 13px}
  #question{
    font-size:23px;
    line-height:1.62;
    min-height:140px;
  }
  #answer{font-size:21px}
  button{font-size:13px;padding:8px 8px}
  .main-actions button{font-size:14px;padding:10px 6px}
}
</style>
</head>

<body>
<main class="app">

  <div class="topbar">
    <h1>キャリコン単語帳</h1>
    <span class="small-note">自分専用</span>
  </div>

  <section class="panel controls">
    <div class="mode-row">
      <button id="allModeButton" class="soft" onclick="setMode('all')">通常</button>
      <button id="wrongModeButton" onclick="setMode('wrong')">✕だけ復習</button>
      <button onclick="shuffleCards()">ランダム</button>
    </div>
    <input id="search" type="text" placeholder="問題・答え・解説を検索" oninput="resetAndDraw()">
  </section>

  <section class="panel study-card">
    <div class="card-head">
      <div id="counter"></div>
      <div id="status" class="status"></div>
    </div>

    <div id="question"></div>
    <img id="cardImage" alt="問題の写真">

    <div class="main-actions">
      <button onclick="previousQuestion()">← 前へ</button>
      <button class="primary" onclick="showAnswer()">答えを見る</button>
      <button onclick="nextQuestion()">次へ →</button>
    </div>

    <div class="secondary-actions">
      <button id="wrongButton" class="soft" onclick="toggleWrong()">間違えた</button>
      <button onclick="startEdit()">編集</button>
      <button class="danger" onclick="deleteCurrent()">削除</button>
    </div>

    <div id="answer" class="hidden"></div>
  </section>

  <details id="editorPanel" class="panel add-wrap">
    <summary id="formTitle">問題を追加</summary>

    <div class="form-body">
      <textarea id="newQuestion" placeholder="問題を入力"></textarea>
      <input id="newAnswer" type="text" placeholder="正解">
      <textarea id="newExplanation" placeholder="解説"></textarea>

      <div class="photo-box" id="photoBox" tabindex="0">
        <strong>写真（任意）</strong>
        <div class="small-note">写真を選ぶか、PCではこの枠に画像を貼り付けられます。</div>
        <input id="photoInput" type="file" accept="image/*">
        <img id="preview" alt="写真のプレビュー">
        <div class="form-actions">
          <button type="button" onclick="removePhoto()">写真を外す</button>
        </div>
      </div>

      <div class="form-actions">
        <button id="saveButton" class="primary" onclick="saveCard()">保存</button>
        <button id="cancelButton" class="hidden" onclick="cancelEdit()">編集をやめる</button>
      </div>

      <div id="message"></div>
    </div>
  </details>

</main>

<script>
const KEY = "careerCardsV2";
let cards = JSON.parse(localStorage.getItem(KEY) || "[]");

if (cards.length === 0) {
  cards = [{
    id: Date.now(),
    question: "スーパーの理論について正しいものはどれか。\\n\\n① 職業興味を6類型に分類した\\n② 自己概念の発達を重視した\\n③ 計画的偶発性を提唱した\\n④ 欲求階層説を提唱した",
    answer: "②",
    explanation: "スーパーは、自己概念の発達を重視したキャリア発達理論を提唱した。",
    wrong: false,
    image: ""
  }];
  saveAll();
}

cards = cards.map(c => ({
  id: c.id || Date.now() + Math.random(),
  question: c.question || "",
  answer: c.answer || "",
  explanation: c.explanation || "",
  wrong: Boolean(c.wrong),
  image: c.image || ""
}));

let current = 0;
let mode = "all";
let shuffled = false;
let order = [];
let editingId = null;
let pendingImage = "";

const $ = id => document.getElementById(id);

function saveAll() {
  localStorage.setItem(KEY, JSON.stringify(cards));
}

function filtered() {
  const keyword = $("search").value.trim().toLowerCase();

  let result = cards.filter(card => {
    const modeOK = mode === "all" || card.wrong;
    const text = `${card.question} ${card.answer} ${card.explanation}`.toLowerCase();
    return modeOK && (keyword === "" || text.includes(keyword));
  });

  if (shuffled) {
    result = order.map(id => result.find(card => card.id === id)).filter(Boolean);
  }
  return result;
}

function draw() {
  const list = filtered();
  $("answer").classList.add("hidden");
  $("answer").textContent = "";

  $("allModeButton").className = mode === "all" ? "soft" : "";
  $("wrongModeButton").className = mode === "wrong" ? "soft" : "";

  if (!list.length) {
    $("counter").textContent = "0問";
    $("status").textContent = "";
    $("question").textContent = "該当する問題がありません。";
    $("cardImage").style.display = "none";
    return;
  }

  if (current >= list.length) current = 0;
  const card = list[current];

  $("counter").textContent = `${current + 1} / ${list.length}問`;
  $("status").textContent = card.wrong ? "✕ 復習対象" : "";
  $("wrongButton").textContent = card.wrong ? "✕を解除" : "間違えた";
  $("question").textContent = card.question;

  if (card.image) {
    $("cardImage").src = card.image;
    $("cardImage").style.display = "block";
  } else {
    $("cardImage").removeAttribute("src");
    $("cardImage").style.display = "none";
  }
}

function showAnswer() {
  const list = filtered();
  if (!list.length) return;
  const card = list[current];
  $("answer").textContent = `【正解】\n${card.answer}\n\n【解説】\n${card.explanation || "解説なし"}`;
  $("answer").classList.remove("hidden");
}

function previousQuestion() {
  const list = filtered();
  if (!list.length) return;
  current = (current - 1 + list.length) % list.length;
  draw();
}

function nextQuestion() {
  const list = filtered();
  if (!list.length) return;
  current = (current + 1) % list.length;
  draw();
}

function toggleWrong() {
  const list = filtered();
  if (!list.length) return;

  const original = cards.find(c => c.id === list[current].id);
  if (!original) return;

  original.wrong = !original.wrong;
  saveAll();
  $("message").textContent = original.wrong
    ? "「間違えた問題」に登録しました。"
    : "「間違えた問題」から外しました。";

  if (mode === "wrong" && !original.wrong) current = 0;
  draw();
}

function setMode(newMode) {
  mode = newMode;
  current = 0;
  shuffled = false;
  order = [];
  draw();
}

function shuffleCards() {
  const list = filtered();
  order = list.map(c => c.id);

  for (let i = order.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [order[i], order[j]] = [order[j], order[i]];
  }

  shuffled = true;
  current = 0;
  draw();
}

function resetAndDraw() {
  current = 0;
  shuffled = false;
  order = [];
  draw();
}

function startEdit() {
  const list = filtered();
  if (!list.length) return;
  const card = list[current];

  editingId = card.id;
  $("formTitle").textContent = "問題を編集";
  $("saveButton").textContent = "変更を保存";
  $("cancelButton").classList.remove("hidden");
  $("newQuestion").value = card.question;
  $("newAnswer").value = card.answer;
  $("newExplanation").value = card.explanation;
  pendingImage = card.image || "";
  updatePreview();

  $("editorPanel").open = true;
  $("editorPanel").scrollIntoView({ behavior: "smooth", block: "start" });
  setTimeout(() => $("newQuestion").focus(), 300);
}

function cancelEdit() {
  editingId = null;
  $("formTitle").textContent = "問題を追加";
  $("saveButton").textContent = "保存";
  $("cancelButton").classList.add("hidden");
  clearForm();
  $("message").textContent = "編集を取り消しました。";
}

function clearForm() {
  $("newQuestion").value = "";
  $("newAnswer").value = "";
  $("newExplanation").value = "";
  $("photoInput").value = "";
  pendingImage = "";
  updatePreview();
}

function saveCard() {
  const question = $("newQuestion").value.trim();
  const answer = $("newAnswer").value.trim();
  const explanation = $("newExplanation").value.trim();

  if (!question || !answer) {
    $("message").textContent = "問題と正解を入力してください。";
    return;
  }

  try {
    if (editingId !== null) {
      const card = cards.find(c => c.id === editingId);
      if (!card) throw new Error();

      card.question = question;
      card.answer = answer;
      card.explanation = explanation;
      card.image = pendingImage;
      saveAll();

      editingId = null;
      $("formTitle").textContent = "問題を追加";
      $("saveButton").textContent = "保存";
      $("cancelButton").classList.add("hidden");
      $("message").textContent = "変更を保存しました。";
    } else {
      cards.push({
        id: Date.now(),
        question,
        answer,
        explanation,
        wrong: false,
        image: pendingImage
      });

      saveAll();
      mode = "all";
      shuffled = false;
      order = [];
      current = cards.length - 1;
      $("message").textContent = "保存しました。";
    }

    clearForm();
    draw();
  } catch (error) {
    $("message").textContent =
      "保存できませんでした。写真が大きすぎる可能性があります。";
  }
}

function deleteCurrent() {
  const list = filtered();
  if (!list.length) return;
  const card = list[current];

  const preview = card.question.replace(/\s+/g, " ").slice(0, 35);
  const ok = confirm(`この問題を削除しますか？\n\n${preview}${card.question.length > 35 ? "…" : ""}`);
  if (!ok) return;

  cards = cards.filter(c => c.id !== card.id);
  saveAll();

  if (editingId === card.id) cancelEdit();
  current = Math.max(0, current - 1);
  $("message").textContent = "問題を削除しました。";
  draw();
}

function updatePreview() {
  if (pendingImage) {
    $("preview").src = pendingImage;
    $("preview").style.display = "block";
  } else {
    $("preview").removeAttribute("src");
    $("preview").style.display = "none";
  }
}

function removePhoto() {
  pendingImage = "";
  $("photoInput").value = "";
  updatePreview();
  $("message").textContent = "写真を外しました。保存すると反映されます。";
}

async function processImage(file) {
  if (!file || !file.type.startsWith("image/")) return;

  const dataUrl = await fileToDataURL(file);
  const img = await loadImage(dataUrl);

  const maxSide = 1000;
  let width = img.width;
  let height = img.height;

  if (Math.max(width, height) > maxSide) {
    const scale = maxSide / Math.max(width, height);
    width = Math.round(width * scale);
    height = Math.round(height * scale);
  }

  const canvas = document.createElement("canvas");
  canvas.width = width;
  canvas.height = height;

  const ctx = canvas.getContext("2d");
  ctx.drawImage(img, 0, 0, width, height);

  pendingImage = canvas.toDataURL("image/jpeg", 0.75);
  updatePreview();
  $("message").textContent = "写真を取り込みました。最後に保存を押してください。";
}

function fileToDataURL(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function loadImage(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = src;
  });
}

$("photoInput").addEventListener("change", async event => {
  const file = event.target.files && event.target.files[0];
  if (file) await processImage(file);
});

$("photoBox").addEventListener("paste", async event => {
  const items = [...(event.clipboardData?.items || [])];
  const imageItem = items.find(item => item.type.startsWith("image/"));
  if (!imageItem) return;

  event.preventDefault();
  const file = imageItem.getAsFile();
  if (file) await processImage(file);
});

draw();
</script>

<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./service-worker.js").catch(error => {
      console.log("Service Worker registration failed:", error);
    });
  });
}
</script>

</body>
</html>
